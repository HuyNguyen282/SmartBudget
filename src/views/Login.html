<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/src/views/Login.css">
</head>

<body>
    <div class="main-container">
        <div class="left-section">
            <h1>LET’S start by logging to your SmartBudget account</h1>

            <form>
                <div class="form-group">
                    <label>Email or Phone</label>
                    <input type="text" class="input-custom" placeholder="example@gmail.com or 09xxxxxxxxx">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="input-custom" id="password" placeholder="Enter Your Password">
                    <i class="fa-solid fa-eye" id="show-password"></i>

                </div>

                <div class="options-row">
                    <label style="margin:0; font-weight:400; color:#1c1c1c; font-size: 13px;">
                        <input type="checkbox"> Remember Me
                    </label>
                    <a href="#" class="forgot-pw">Forgot Password?</a>
                </div>

                <button type="button" class="btn-primary">Login</button>

                <button type="button" class="btn-facebook">
                    <i class="fa-brands fa-facebook-f"></i> Login with Facebook
                </button>

                <div class="divider">Or With</div>

                <button type="button" class="btn-google">
                    <img width="35" height="35" src="https://img.icons8.com/plasticine/100/google-logo.png"
                        alt="google-logo" />
                    Login with Google
                </button>

                <p style="text-align: center; margin-top: 20px; font-size: 13px;">
                    Don't have an account? <a href="/src/views/Signin.html"
                        style="color: #0E64D1; font-weight: 600; text-decoration: none;">Sign Up</a>
                </p>
            </form>


        </div>
        <div class="right-section">
            <img class="img" src="/src/pic/icon.png" alt="App preview">
        </div>
    </div>
    <script src="/src/js/login.js"></script>
</body>

</html>
