<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - SmartBudget</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/src/views/Login.css">
</head>

<body>
    <div class="main-container">
        <div class="left-section">
            <h1>Create Your Account!
                <br>
                I hope you have a great experience
            </h1>

            <form>
                <div class="row">
                    <div class="form-group">
                        <input type="text" class="form-control input-custom" placeholder=" " required>
                        <label for="username">First name</label>
                    </div>

                    <div class="form-group">
                        <input type="text" class="input-custom" placeholder="Last Name">
                    </div>
                </div>


                <div class="form-group">
                    <input type="email" class="input-custom" id="email" placeholder="Enter Your Email">
                </div>
                <div class="form-group">
                    <input type="password" class="input-custom" id="password" placeholder="Enter Your Password">
                    <i class="fa-solid fa-eye" id="show-password"></i>
                </div>

                <button type="button" class="btn-primary" id="signup-btn">Sign up</button>
                <div class="divider">Or With</div>
                <button type="button" class="btn-facebook">
                    <i class="fa-brands fa-facebook-f"></i> Continue with Facebook
                </button>
                <button type="button" class="btn-google">
                    <img width="35" height="35" src="https://img.icons8.com/plasticine/100/google-logo.png"
                        alt="google-logo" />
                    Continue with Google
                </button>

                <p style="text-align: center; margin-top: 20px; font-size: 13px;">
                    Already have an account? <a href="/src/views/Login.html"
                        style="color: #0E64D1; font-weight: 600; text-decoration: none;">Login</a>
                </p>
            </form>


        </div>
        <div class="right-section">
            <img class="img" src="/src/pic/icon.png" alt="App preview">
        </div>
        <style>
            #show-password {
                position: absolute;
                right: 15px;
                top: 50%;
                transform: translateY(-50%);
                cursor: pointer;
                color: #666;
            }

            .input-custom {
                width: 100%;
                font-size: 14px;
                padding: 13px 16px;
                padding-right: 40px;
                border-radius: 6px;
                border: 1px solid #AAB7B0;
                background: rgba(235, 245, 238, 0.6);
                color: #333;
                transition: 0.3s;
                margin-bottom: 10px;
            }
        </style>

    </div>
    <script src="/src/js/register.js"></script>
    <script src="/src/js/login.js"></script>
</body>

</html>
